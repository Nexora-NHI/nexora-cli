name: Demo GIF

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - demo.tape

permissions:
  contents: write

jobs:
  demo:
    name: Generate demo GIF
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6.2.0
        with:
          go-version: "1.24.13"
          cache: true

      - name: Build nexora binary
        run: |
          go build -o /usr/local/bin/nexora .

      - name: Install VHS dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg ttyd

      - name: Install VHS
        run: go install github.com/charmbracelet/vhs@latest

      - name: Generate demo GIF
        run: vhs demo.tape

      - name: Commit demo.gif
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add demo.gif
          git diff --cached --quiet || git commit -m "chore: regenerate demo.gif [skip ci]"
          git push
